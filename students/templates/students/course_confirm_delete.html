{% extends 'base.html' %}

{% block title %}Delete Course - Student Management System{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Delete Course</h2>
        </div>

        <p class="text-gray-600 text-center mb-6">
            Are you sure you want to delete <strong>{{ course.name }}</strong> ({{ course.code }})? This action cannot be undone.
        </p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="flex space-x-4">
                <a href="{% url 'course-list' %}" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded text-center">Cancel</a>
                <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
